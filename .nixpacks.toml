[phases.setup]
nixpkgs = ["php82", "php82Extensions.intl", "php82Extensions.zip", "php82Extensions.pdo_pgsql", "php82Extensions.redis", "composer", "nodejs", "nginx"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-intl --ignore-platform-req=ext-zip"
]

[phases.build]
cmds = [
  "npm install",
  "npm run build"
]
