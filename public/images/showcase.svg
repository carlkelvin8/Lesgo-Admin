<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="showcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8e9eab" />
      <stop offset="100%" stop-color="#eef2f3" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>
  
  <!-- Background shapes -->
  <rect x="0" y="0" width="500" height="500" fill="none" />
  <circle cx="100" cy="100" r="150" fill="url(#showcaseGrad)" opacity="0.2"/>
  <circle cx="400" cy="400" r="200" fill="url(#showcaseGrad)" opacity="0.2"/>

  <!-- Main graphic elements -->
  <g transform="translate(50, 50)">
    <!-- Box 1 -->
    <rect x="100" y="200" width="100" height="100" rx="10" fill="url(#accentGrad)" opacity="0.8" transform="rotate(-10 150 250)">
      <animateTransform attributeName="transform" type="rotate" from="-10 150 250" to="5 150 250" dur="8s" repeatCount="indefinite" values="-10 150 250; 5 150 250; -10 150 250" keyTimes="0; 0.5; 1"/>
    </rect>
    
    <!-- Box 2 -->
    <rect x="250" y="150" width="80" height="80" rx="10" fill="url(#accentGrad)" opacity="0.6" transform="rotate(15 290 190)">
       <animateTransform attributeName="transform" type="rotate" from="15 290 190" to="-5 290 190" dur="10s" repeatCount="indefinite" values="15 290 190; -5 290 190; 15 290 190" keyTimes="0; 0.5; 1"/>
    </rect>

    <!-- Connecting lines -->
    <path d="M 150 220 Q 250 180 280 180" stroke="#667eea" stroke-width="4" fill="none" stroke-dasharray="10 5">
        <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Globe/Map lines -->
    <circle cx="250" cy="250" r="180" stroke="#bdc3c7" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M 70 250 A 180 180 0 0 1 430 250" stroke="#bdc3c7" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M 250 70 A 180 180 0 0 1 250 430" stroke="#bdc3c7" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
</svg>